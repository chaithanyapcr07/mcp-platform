id: servicenow
name: ServiceNow MCP Connector
description: Provides governed access to ServiceNow incident search, read, create, and update operations.
owner_team: ai-platform
runtime_owner: ai-platform
business_owner: service-management-platform
security_reviewer: security-platform
support_channel: "#ai-platform"
on_call_rotation: ai-platform-primary
business_domain: it-service-management
connector_type: issue_tracker
version: 0.1.0
status: approved
runtime_type: managed
deployment_mode: managed
runtime_url: http://servicenow:4300
environment: local
auth_type: api_token
risk_level: high
data_classification: confidential
required_scopes:
  - incident:read
  - incident:write
tools:
  - name: servicenow.search_incidents
    description: Search ServiceNow incidents.
    type: read
    risk_level: low
    permission: tool:execute
  - name: servicenow.get_incident
    description: Read a ServiceNow incident by number.
    type: read
    risk_level: low
    permission: tool:execute
  - name: servicenow.create_incident
    description: Create a ServiceNow incident.
    type: write
    risk_level: high
    permission: tool:execute
    requires_human_approval: true
  - name: servicenow.update_incident
    description: Update a ServiceNow incident.
    type: write
    risk_level: high
    permission: tool:execute
    requires_human_approval: true
resources:
  - name: servicenow_incident
    uri: servicenow://incidents/{number}
    description: Read-only ServiceNow incident resource.
prompts:
  - name: servicenow_incident_triage_prompt
    description: Prompt for triaging a ServiceNow incident.
policies:
  audit_all_calls: true
  allow_write_actions_by_default: false
  require_project_access: true
  require_human_approval_for_write_tools: true

