services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: mcp_platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_platform"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  local-knowledge-base:
    build:
      context: ..
      dockerfile: connectors/local-knowledge-base/Dockerfile
    environment:
      CONNECTOR_PORT: 4100
    ports:
      - "4100:4100"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://mcp:mcp@postgres:5432/mcp_platform?schema=public
      JWT_SECRET: local-dev-secret-change-me
      LOCAL_KB_CONNECTOR_URL: http://local-knowledge-base:4100
      API_PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      local-knowledge-base:
        condition: service_started
    command: sh -c "npm run db:generate -w @mcp-platform/api && npm run db:deploy -w @mcp-platform/api && npm run db:seed -w @mcp-platform/api && npm run start -w @mcp-platform/api"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
