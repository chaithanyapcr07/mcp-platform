id: jira
name: Jira MCP Connector
description: Provides governed access to Jira issue search, read, create, comment, and transition operations.
owner_team: ai-platform
runtime_owner: ai-platform
business_owner: engineering-platform
security_reviewer: security-platform
support_channel: "#ai-platform"
on_call_rotation: ai-platform-primary
business_domain: engineering
connector_type: issue_tracker
version: 0.1.0
runtime_type: managed
deployment_mode: managed
runtime_url: http://jira:4200
environment: local
slo:
  availability: "99.9"
  latency_p95_ms: 500
maintenance:
  patch_window: Wednesdays 18:00-20:00 local
  owner_review_interval: quarterly
deprecation_policy: 90-day notice before disabling production versions
auth_type: api_token
risk_level: high
data_classification: confidential
status: approved
deployment_target: local-docker
source_repository: connectors/jira
documentation_url: connectors/jira/README.md
required_scopes:
  - read:jira-work
  - write:jira-work
tools:
  - name: jira.search_issues
    description: Search Jira issues using approved JQL patterns.
    type: read
    risk_level: low
    permission: tool:execute
  - name: jira.get_issue
    description: Read a Jira issue by key.
    type: read
    risk_level: low
    permission: tool:execute
  - name: jira.create_issue
    description: Create a Jira issue in an approved project.
    type: write
    risk_level: high
    permission: tool:execute
    requires_human_approval: true
  - name: jira.add_comment
    description: Add a comment to an existing Jira issue.
    type: write
    risk_level: medium
    permission: tool:execute
    requires_human_approval: true
  - name: jira.transition_issue
    description: Transition a Jira issue status.
    type: write
    risk_level: high
    permission: tool:execute
    requires_human_approval: true
resources:
  - name: jira_issue
    uri: jira://issues/{issueKey}
    description: Read-only Jira issue resource.
prompts:
  - name: jira_bug_triage_prompt
    description: Prompt template for triaging a bug and preparing Jira issue fields.
policies:
  audit_all_calls: true
  allow_write_actions_by_default: false
  require_project_access: true
  require_human_approval_for_write_tools: true
