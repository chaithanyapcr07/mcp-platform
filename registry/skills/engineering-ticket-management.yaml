id: engineering-ticket-management
name: Engineering Ticket Management
description: Governed Jira ticket search, read, create, comment, and transition capability.
owner_team: ai-platform
version: 1.0.0
status: approved
risk_level: high
data_classification: confidential
required_connectors:
  - jira
allowed_tools:
  - jira.search_issues
  - jira.get_issue
  - jira.create_issue
  - jira.add_comment
  - jira.transition_issue
allowed_resources:
  - jira://issues/{issueKey}
allowed_prompts:
  - jira_bug_triage_prompt
required_permissions:
  - tool:execute
approval_requirements:
  - human_approval_for_write_tools
policy_constraints:
  - audit_required
  - write_tools_require_human_approval
evals:
  - jira-ticket-management-eval
examples:
  - Search open bugs
  - Create a bug ticket from incident context
